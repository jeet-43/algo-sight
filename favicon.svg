<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="colorGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feFlood flood-color="#6b8aff" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="b" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="iris" cx="32" cy="32" r="9" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5bfff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6b8aff" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#1a2240" stop-opacity=".4"/>
    </radialGradient>
  </defs>

  <!-- Dim structural edges -->
  <g stroke="#252b40" stroke-width=".5" stroke-linecap="round" opacity=".3">
    <line x1="16" y1="22" x2="26" y2="46"/>
    <line x1="48" y1="22" x2="38" y2="46"/>
    <line x1="26" y1="18" x2="16" y2="42"/>
    <line x1="38" y1="18" x2="48" y2="42"/>
    <line x1="26" y1="18" x2="32" y2="32"/>
    <line x1="38" y1="18" x2="32" y2="32"/>
    <line x1="26" y1="46" x2="32" y2="32"/>
    <line x1="38" y1="46" x2="32" y2="32"/>
    <line x1="16" y1="22" x2="32" y2="32"/>
    <line x1="48" y1="22" x2="32" y2="32"/>
    <line x1="16" y1="42" x2="32" y2="32"/>
    <line x1="48" y1="42" x2="32" y2="32"/>
  </g>

  <!-- Eye outline — upper lid with color glow -->
  <g filter="url(#colorGlow)">
    <polyline points="6,32 16,22 26,18 38,18 48,22 58,32"
      stroke="#7a9ad4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".75"/>
  </g>
  <!-- Eye outline — lower lid with color glow -->
  <g filter="url(#colorGlow)">
    <polyline points="6,32 16,42 26,46 38,46 48,42 58,32"
      stroke="#7a9ad4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".75"/>
  </g>

  <!-- Iris with strong glow -->
  <g filter="url(#colorGlow)">
    <circle cx="32" cy="32" r="9" fill="url(#iris)"/>
    <circle cx="32" cy="32" r="9" fill="none" stroke="#7a9ad4" stroke-width=".7" opacity=".5"/>
  </g>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="3.8" fill="#08090e"/>
  <!-- Pupil highlight -->
  <circle cx="30.2" cy="30.2" r="1.3" fill="#c8d4f0" opacity=".45"/>

  <!-- Lid nodes (upper) with stronger glow -->
  <g filter="url(#colorGlow)">
    <circle cx="16" cy="22" r="2" fill="#7a9ad4" opacity=".85"/>
    <circle cx="26" cy="18" r="2" fill="#7a9ad4" opacity=".85"/>
    <circle cx="38" cy="18" r="2" fill="#7a9ad4" opacity=".85"/>
    <circle cx="48" cy="22" r="2" fill="#7a9ad4" opacity=".85"/>
  </g>
  <!-- Lid nodes (lower) with stronger glow -->
  <g filter="url(#colorGlow)">
    <circle cx="16" cy="42" r="2" fill="#7a9ad4" opacity=".85"/>
    <circle cx="26" cy="46" r="2" fill="#7a9ad4" opacity=".85"/>
    <circle cx="38" cy="46" r="2" fill="#7a9ad4" opacity=".85"/>
    <circle cx="48" cy="42" r="2" fill="#7a9ad4" opacity=".85"/>
  </g>
  <!-- Corner tip nodes with stronger glow -->
  <g filter="url(#colorGlow)">
    <circle cx="6" cy="32" r="2.2" fill="#b5cfff" opacity=".8"/>
    <circle cx="58" cy="32" r="2.2" fill="#b5cfff" opacity=".8"/>
  </g>
</svg>
